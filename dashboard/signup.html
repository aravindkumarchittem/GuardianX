<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuardianX — Sign Up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-brand">
      <div class="auth-brand-icon">🛡️</div>
      <h2>GuardianX</h2>
      <p>Create your account</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Choose a username" autocomplete="username" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Choose a password" autocomplete="new-password" />
    </div>

    <button class="btn btn-primary auth-submit" onclick="signup()">✨ Create Account</button>

    <div class="auth-error"   id="errorMsg"></div>
    <div class="auth-success" id="successMsg"></div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<script>
  const saved = localStorage.getItem("gx-theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
</script>
<script src="signup.js"></script>
</body>
</html>
