<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuardianX — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-brand">
      <div class="auth-brand-icon">🛡️</div>
      <h2>GuardianX</h2>
      <p>Sign in to your threat dashboard</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Enter username" autocomplete="username" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary auth-submit" onclick="login()">🔐 Sign In</button>

    <div class="auth-error" id="error">Invalid credentials. Please try again.</div>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>

  </div>
</div>

<script>
  // Apply saved theme
  const saved = localStorage.getItem("gx-theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
</script>
<script src="login.js"></script>
</body>
</html>
